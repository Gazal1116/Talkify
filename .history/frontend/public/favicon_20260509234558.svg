<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chat bubble background -->
  <path d="M 20 15 L 80 15 Q 85 15 85 20 L 85 65 Q 85 70 80 70 L 30 70 L 20 82 L 25 70 L 20 70 Q 15 70 15 65 L 15 20 Q 15 15 20 15" fill="url(#grad1)" />
  
  <!-- Dots for typing indicator -->
  <circle cx="30" cy="45" r="4" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="45" r="4" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" begin="0.2s" />
  </circle>
  <circle cx="70" cy="45" r="4" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" begin="0.4s" />
  </circle>
</svg>